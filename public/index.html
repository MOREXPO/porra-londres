<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porras</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="container">
      <header>
        <h1 id="poolTitle">Porras</h1>
        <p id="poolSubtitle">Gestiona varias porras, cada una con sus apuestas y gráficos.</p>
      </header>

      <section class="card">
        <h2>Administrar porras</h2>
        <div class="pool-row">
          <label for="poolSelect">Porra activa</label>
          <select id="poolSelect"></select>
          <button id="reloadPoolsBtn" type="button">Recargar</button>
        </div>

        <form id="createPoolForm" class="pool-create-form">
          <input id="newPoolName" placeholder="Nombre nueva porra" required maxlength="120" />
          <input id="createPoolAdminKey" type="password" placeholder="Clave admin" required />
          <button type="submit">Crear porra</button>
        </form>
        <p id="poolStatus" class="muted"></p>
      </section>

      <section class="card">
        <h2>Tu apuesta</h2>
        <form id="betForm">
          <input id="name" placeholder="Tu nombre" required maxlength="30" />
          <input id="count" type="number" placeholder="Tu predicción" min="0" required />
          <button type="submit">Guardar apuesta</button>
        </form>
        <p id="status"></p>
      </section>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="clasificacion">Clasificación + gráfico</button>
          <button class="tab-btn" data-tab="podio">Podio de los más cercanos</button>
        </div>

        <div id="tab-clasificacion" class="tab-panel active">
          <h2>Clasificación</h2>
          <div id="leaderboard" class="board"></div>
          <h3>Gráfico de predicciones</h3>
          <div id="chart" class="chart"></div>
        </div>

        <div id="tab-podio" class="tab-panel">
          <h2>Podio visual</h2>

          <div class="card admin-card">
            <h3>Publicar resultado real (porra activa)</h3>
            <form id="resultForm" class="result-form">
              <input id="realCount" type="number" min="0" placeholder="Resultado real" required />
              <input id="adminKey" type="password" placeholder="Clave admin" required />
              <button type="submit">Guardar resultado</button>
            </form>
            <p id="resultStatus" class="muted"></p>
          </div>

          <p id="podioHint" class="muted"></p>
          <div id="podium" class="podium"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
