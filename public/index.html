<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porra Londres · Incidencias</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="container">
      <header>
        <h1>Porra semanal de incidencias en Londres</h1>
        <p>Compite con tus colegas adivinando el número de robos reportados por semana.</p>
      </header>

      <section class="card">
        <h2>Enviar apuesta</h2>
        <form id="betForm">
          <input id="name" placeholder="Tu nombre" required maxlength="30" />
          <input id="week" placeholder="Semana (ej: 2026-W13)" required />
          <input id="count" type="number" placeholder="Tu predicción" min="0" required />
          <button type="submit">Guardar apuesta</button>
        </form>
        <p id="status"></p>
      </section>

      <section class="card">
        <h2>Clasificación</h2>
        <div id="leaderboard" class="board"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
