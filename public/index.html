<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porras</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="container">
      <header>
        <h1 id="poolTitle">Porras</h1>
        <p>Gestiona varias porras, cada una con sus apuestas, gráfico y podio.</p>
      </header>

      <section class="card">
        <h2>Porras disponibles</h2>
        <div class="pool-row">
          <label for="poolSelect">Porra activa</label>
          <select id="poolSelect"></select>
          <button id="reloadPoolsBtn" type="button">Recargar</button>
        </div>
        <p id="poolStatus" class="muted"></p>
      </section>

      <section class="card">
        <h2>Tu apuesta</h2>
        <form id="betForm">
          <input id="name" placeholder="Tu nombre" required maxlength="30" />
          <input id="count" type="number" placeholder="Tu predicción" min="0" required />
          <button type="submit">Guardar apuesta</button>
        </form>
        <p id="status"></p>
      </section>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="clasificacion">Clasificación + gráfico</button>
          <button class="tab-btn" data-tab="podio">Podio de los más cercanos</button>
        </div>

        <div id="tab-clasificacion" class="tab-panel active">
          <h2>Clasificación</h2>
          <div id="leaderboard" class="board"></div>
          <h3>Gráfico de predicciones</h3>
          <div id="chart" class="chart"></div>
        </div>

        <div id="tab-podio" class="tab-panel">
          <h2>Podio visual</h2>
          <p id="podioHint" class="muted"></p>
          <div id="podium" class="podium"></div>
        </div>
      </section>

      <section class="card">
        <h2>Vista de administrador</h2>

        <div id="adminLoginBox">
          <form id="adminLoginForm" class="admin-login-form">
            <input id="adminEmail" type="email" placeholder="Email administrador" required />
            <input id="adminPassword" type="password" placeholder="Contraseña" required />
            <button type="submit">Entrar como administrador</button>
          </form>
          <p id="adminLoginStatus" class="muted"></p>
        </div>

        <div id="adminPanel" class="hidden">
          <div class="admin-head">
            <p>Sesión iniciada como <b id="adminWho"></b></p>
            <button id="adminLogoutBtn" type="button" class="mini-btn">Cerrar sesión</button>
          </div>

          <div class="admin-grid">
            <form id="createPoolForm">
              <h3>Crear porra</h3>
              <input id="newPoolName" placeholder="Nombre de la nueva porra" required maxlength="120" />
              <button type="submit">Crear</button>
            </form>

            <form id="editPoolForm">
              <h3>Editar porra activa</h3>
              <input id="editPoolName" placeholder="Nuevo nombre de la porra activa" required maxlength="120" />
              <button type="submit">Guardar nombre</button>
              <button id="deletePoolBtn" class="danger-btn" type="button">Eliminar porra activa</button>
            </form>

            <form id="resultForm">
              <h3>Publicar resultado real</h3>
              <input id="realCount" type="number" min="0" placeholder="Resultado real" required />
              <button type="submit">Guardar resultado</button>
            </form>
          </div>

          <p id="adminStatus" class="muted"></p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
